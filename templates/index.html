<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝江号集成终端</title>
<style>
  :root {
    --bg:     #1a1a1a;
    --bg2:    #222;
    --bg3:    #2a2a2a;
    --border: #383838;
    --text:   #ddd;
    --dim:    #777;
    --up:     #ff4d4d;
    --down:   #00cc66;
    --accent: #4db8ff;
    --gold:   #ffd700;
    --live:   #ff8c42;
  }

  html { height: 100%; }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Microsoft YaHei', '微软雅黑', sans-serif;
    font-size: 13px;
    padding: 5px 8px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  h1 {
    flex-shrink: 0;
    position: relative;
    text-align: center;
    color: var(--gold);
    font-size: 15px;
    border: 1px solid #3a5a8a;
    padding: 4px 0;
    margin-bottom: 6px;
    background: #0d1b2a;
    letter-spacing: 2px;
  }
  #header-clock {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    letter-spacing: 0;
    opacity: 0.8;
    font-family: 'Courier New', monospace;
  }

  /* ── 左右分栏 ── */
  #app {
    display: flex;        /* 横向排列左栏和右栏 */
    gap: 8px;             /* 左右栏之间的间距 */
    align-items: stretch; /* 左右栏等高，各自撑满 #app 的高度 */
    flex: 1;              /* 占满 body 中标题栏以下的全部剩余高度 */
    min-height: 0;        /* 允许 flex 子元素在高度上收缩（防止溢出 body） */
    overflow: hidden;     /* 裁掉超出 #app 边界的内容，禁止整体滚动 */
  }
  #left-col {
    flex: 0 0 50%;    /* 不伸缩，固定占父容器（#app）宽度的 50% */
    min-width: 0;     /* 允许内容压缩到比 50% 更窄，防止表格撑破布局 */
    overflow: hidden; /* 内部上下两半各自管理自己的滚动，左栏本身不滚 */
  }
  /* 左栏滚动条样式（供内部子容器复用） */
  #left-col::-webkit-scrollbar { width: 4px; height: 4px; }
  #left-col::-webkit-scrollbar-track { background: var(--bg2); }
  #left-col::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 行情内容区：填满左栏，纵向 flex 以便上下分割 */
  #main {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ── 左栏上半（自选股 + 期货）：固定占 35% ── */
  .left-top {
    flex: 0 0 35%;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* 上半内的 top-row 撑满剩余高度，子卡片等高 */
  .left-top .top-row {
    flex: 1;
    min-height: 0;
    margin-bottom: 0;
    align-items: stretch;
  }
  /* 上半卡片变为纵向 flex，使 table 能撑满卡片高度 */
  .left-top .card {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* table 填满卡片，行高自动均分（自适应间距） */
  .left-top .card table { flex: 1; height: 100%; }

  /* ── 左栏下半（A股榜单）：占剩余 65% ── */
  .left-bottom {
    flex: 1;         /* 占 #main 中剩余的全部高度（约 65%） */
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* 三列榜单网格撑满下半区 */
  .left-bottom #leaderboard-grid {
    flex: 1;
    min-height: 0;
    align-items: stretch;
    grid-template-rows: 1fr;   /* 单行撑满 flex 给定的高度，而非按内容 auto */
  }
  /* 每张榜单卡片纵向 flex，撑满网格行高 */
  .left-bottom .card {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  /* 榜单滚动区填满卡片（替代固定 max-height） */
  .left-bottom .lb-body {
    flex: 1;
    max-height: none;
  }
  /* 榜单 table 填满滚动区，行高自动均分（自适应间距） */
  .left-bottom .lb-body table { height: 100%; }

  /* ── 右栏：上下两半 ── */
  #news-panel {
    flex: 1;
    min-width: 0;
    height: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
  }
  .news-half {
    flex: 1;
    min-height: 0;          /* 允许 flex 子元素收缩 */
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .news-half .card-title { flex-shrink: 0; }

  /* Live 标题栏颜色 */
  .live-title { color: var(--live) !important; }

  /* 脉冲红点 */
  .live-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: #ff4444;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    animation: livepulse 1.5s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%, 100% { opacity: 1;   box-shadow: 0 0 0 0   rgba(255,68,68,.5); }
    50%       { opacity: 0.5; box-shadow: 0 0 0 4px rgba(255,68,68,0);  }
  }

  /* 可滚动内容区（新闻 / Live 共用） */
  .news-scroll {
    flex: 1;
    overflow-y: auto;
  }
  .news-scroll::-webkit-scrollbar { width: 4px; }
  .news-scroll::-webkit-scrollbar-track { background: var(--bg2); }
  .news-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 新闻条目 */
  .news-item {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
  }
  .news-item:last-child { border-bottom: none; }
  .news-item:hover { background: #2a2a2a; }
  .news-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }
  .news-source {
    font-size: 10px; font-weight: bold;
    padding: 1px 5px; border-radius: 2px;
    background: #1c2d40; color: var(--accent);
  }
  .news-time  { font-size: 10px; color: var(--dim); }
  .news-title { font-size: 12px; line-height: 1.45; }
  .news-title a { color: var(--text); text-decoration: none; }
  .news-title a:hover { color: var(--accent); text-decoration: underline; }

  @keyframes newsflash {
    0%   { background: #1c3a50; }
    100% { background: transparent; }
  }
  .news-new { animation: newsflash 2s ease-out; }

  /* ── Live News 固定行（每源一行，无滚动）── */
  #live-list {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .live-row {
    flex: 0 0 20%;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 6px;
  }
  .live-row:last-child { border-bottom: none; }
  .live-row:hover { background: #2a2a2a; }
  .live-row-inner {
    display: flex;
    align-items: center;
    gap: 5px;
    width: 100%;
    min-width: 0;
  }
  .live-row-inner.live-flip {
    animation: liveFlip 0.4s ease-out;
  }
  @keyframes liveFlip {
    0%   { transform: translateY(-110%); opacity: 0; }
    100% { transform: translateY(0);     opacity: 1; }
  }
  .live-badge {
    font-size: 12px; font-weight: bold;
    padding: 1px 4px; border-radius: 2px;
    background: #2d1c0d; color: var(--live);
    flex-shrink: 0; white-space: nowrap;
  }
  .live-row-time { font-size: 12px; color: var(--dim); flex-shrink: 0; }
  .live-row-title {
    font-size: 14px; flex: 1;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }
  .live-row-title a { color: var(--text); text-decoration: none; }
  .live-row-title a:hover { color: var(--live); text-decoration: underline; }

  /* ── 分区线 ── */
  .section-rule {
    border: none; border-top: 1px solid var(--border);
    margin: 6px 0 5px; text-align: center; font-size: 12px; line-height: 0;
  }
  .section-rule span { background: var(--bg); padding: 0 8px; color: var(--accent); }

  /* ── 网格 ── */
  .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .top-row { display: flex; gap: 5px; align-items: flex-start; margin-bottom: 6px; }
  .top-row .grid-2 { flex: 1; min-width: 0; }
  #futures-panel { flex: 0 0 210px; display: flex; flex-direction: column; min-height: 0; }
  #futures-panel .card { flex: 1; min-height: 0; }

  /* ── 卡片 ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
  .card-title {
    background: #1c2d40; color: var(--accent);
    padding: 3px 8px; font-weight: bold;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }

  /* ── 表格 ── */
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--bg3); color: var(--dim);
    padding: 2px 2px; text-align: right; font-weight: normal;
    border-bottom: 1px solid var(--border); white-space: nowrap; font-size: 11px;
  }
  th.l { text-align: left; }
  td {
    padding: 2px 2px; text-align: right;
    white-space: nowrap; border-bottom: 1px solid #252525; font-size: 12px;
  }
  td.l   { text-align: left; }
  td.dim { color: var(--dim); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #2e2e2e; }

  /* 名称→当前价 列间距 */
  #watchlist-grid   td:nth-child(2), #watchlist-grid   th:nth-child(2) { padding-right: 2px; }
  #watchlist-grid   td:nth-child(3), #watchlist-grid   th:nth-child(3) { padding-left:  2px; }
  #leaderboard-grid td:nth-child(3), #leaderboard-grid th:nth-child(3) { padding-right: 2px; }
  #leaderboard-grid td:nth-child(4), #leaderboard-grid th:nth-child(4) { padding-left:  2px; }
  #futures-panel    td:nth-child(1), #futures-panel    th:nth-child(1) { padding-right: 2px; }
  #futures-panel    td:nth-child(2), #futures-panel    th:nth-child(2) { padding-left:  2px; }

  /* ── 榜单滚动 ── */
  .lb-body { max-height: calc(45vh - 60px); overflow-y: auto; }
  .lb-body::-webkit-scrollbar { width: 4px; }
  .lb-body::-webkit-scrollbar-track { background: var(--bg2); }
  .lb-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .lb-body thead th { position: sticky; top: 0; z-index: 1; }
  /* 新闻头条：2 列网格，每源一块 */
  #news-list {
    flex: 1; min-height: 0;
    display: grid; grid-template-columns: repeat(2, 1fr);
    overflow-y: hidden; gap: 3px; padding: 3px;
  }
  .news-block {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 2px;
    padding: 5px 7px; display: flex; flex-direction: column; gap: 3px;
    overflow: hidden; min-height: 0; transition: opacity 0.25s ease;
  }
  .news-block.nb-cycling { opacity: 0.2; }
  .nb-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .nb-title {
    flex: 1; overflow: hidden; font-size: 12px; line-height: 1.4;
  }
  .nb-title a {
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    line-clamp: 3; overflow: hidden;
    color: var(--text); text-decoration: none;
  }
  .nb-title a:hover { color: var(--accent); text-decoration: underline; }
  .nb-meta { display: flex; align-items: center; gap: 4px; }
  .news-new-badge {
    font-size: 10px; color: #4ade80; font-weight: bold; cursor: pointer;
    white-space: nowrap; border: 1px solid rgba(74,222,128,.5);
    border-radius: 2px; padding: 0 3px; flex-shrink: 0;
  }
  .news-new-badge:hover { opacity: 0.6; }

  /* Live News 内嵌块（占满一整行） */
  .live-block { grid-column: 1 / -1; }
  .live-inline-body { display: flex; align-items: center; gap: 4px; flex: 1; min-height: 0; overflow: hidden; }
  .live-nav {
    flex-shrink: 0; background: none; border: 1px solid var(--border);
    color: var(--dim); cursor: pointer; border-radius: 2px;
    font-size: 18px; line-height: 1; padding: 1px 7px;
    transition: color 0.2s, border-color 0.2s;
  }
  .live-nav:hover { border-color: var(--live); color: var(--live); }
  .live-dots { display: flex; gap: 6px; justify-content: center; flex-shrink: 0; padding: 2px 0 1px; }
  .live-dot-item {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border); transition: background 0.3s, transform 0.3s;
  }
  .live-dot-item.active { background: var(--live); transform: scale(1.4); }

  /* 扩展面板 */
  #ext-panel { flex: 1; min-height: 0; overflow: hidden; }
  #dino-canvas { display: block; }

  /* ── 颜色 ── */
  .up { color: var(--up); }
  .dn { color: var(--down); }
  .na { color: var(--dim); }

  @keyframes flash { 0% { background: #4a3d18; } 100% { background: transparent; } }
  .hl td { animation: flash 0.6s ease-out; }

  /* ── 状态栏 ── */
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 6px; padding: 3px 8px;
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--dim); font-size: 11px;
  }
  .status-bar .val   { color: var(--text); }
  .status-bar .alert { color: var(--gold); }

  #loading { text-align: center; padding: 60px 0; color: var(--gold); font-size: 16px; }
  #main    { display: none; }
</style>
</head>
<body>
<h1><span id="header-clock"></span>帝江号集成终端</h1>

<div id="app">

  <!-- 左栏：行情 -->
  <div id="left-col">
    <div id="loading">正在加载数据…</div>
    <div id="main">
      <!-- 上半：自选股 + 期货（35%） -->
      <div class="left-top">
        <div class="top-row">
          <div class="grid-2" id="watchlist-grid"></div>
          <div id="futures-panel"></div>
        </div>
      </div>
      <!-- 下半：A股榜单（65%） -->
      <div class="left-bottom">
        <p class="section-rule"><span>── A 股榜单 ──</span></p>
        <div class="grid-3" id="leaderboard-grid"></div>
        <div class="status-bar">
          <span>刷新间隔: <span class="val" id="interval-val">--</span>s</span>
          <span>最后更新: <span class="val" id="updated-val">--</span></span>
          <span id="alert-val" class="alert"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- 右栏：新闻（上半）+ Live News（下半） -->
  <div id="news-panel">

    <div class="news-half card">
      <div class="card-title">新闻头条</div>
      <div id="news-list"></div>
    </div>

    <div class="news-half card">
      <div class="card-title">扩展面板</div>
      <div id="ext-panel"><canvas id="dino-canvas"></canvas></div>
    </div>

  </div>

</div><!-- #app -->

<script>
const CAT_ORDER = ['大盘指数', 'A 股', '港  股', 'ETF'];
let _interval = 10;

/* ── 格式化 ── */
function colorCls(pct) {
  if (pct == null) return 'na';
  return pct > 0 ? 'up' : pct < 0 ? 'dn' : '';
}
function fmtPct(pct) {
  if (pct == null) return '<span class="na">N/A</span>';
  const s = pct >= 0 ? '+' : '';
  return `<span class="${colorCls(pct)}">${s}${pct.toFixed(2)}%</span>`;
}
function fmtPrice(p, pct) {
  if (p == null) return '<span class="na">N/A</span>';
  return `<span class="${colorCls(pct)}">${p.toFixed(2)}</span>`;
}
function fmtChange(c, pct) {
  if (c == null) return '<span class="na">N/A</span>';
  const s = c >= 0 ? '+' : '';
  return `<span class="${colorCls(pct)}">${s}${c.toFixed(2)}</span>`;
}
function fmtVol(v) {
  return (v && v !== 'N/A') ? `<span class="na">${v}</span>` : '<span class="na">N/A</span>';
}
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 行情卡片 ── */
function watchlistCard(title, rows, hlSet) {
  let h = `<div class="card"><div class="card-title">${title}</div><table>
    <thead><tr><th class="l">代码</th><th class="l">名称</th>
      <th>当前价</th><th>涨跌额</th><th>涨跌幅%</th><th>均量(3M)</th>
    </tr></thead><tbody>`;
  for (const r of rows) {
    h += `<tr class="${hlSet.has(r.ticker)?'hl':''}">
      <td class="l dim">${r.ticker}</td>
      <td class="l ${colorCls(r.pct)}">${r.name}</td>
      <td>${fmtPrice(r.price,r.pct)}</td><td>${fmtChange(r.change,r.pct)}</td>
      <td>${fmtPct(r.pct)}</td><td>${fmtVol(r.volume)}</td></tr>`;
  }
  return h + '</tbody></table></div>';
}
function leaderboardCard(title, rows, hlSet) {
  let h = `<div class="card"><div class="card-title">${title}</div>
    <div class="lb-body"><table>
    <thead><tr><th>#</th><th class="l">代码</th><th class="l">名称</th>
      <th>最新价</th><th>涨跌幅%</th><th>成交量</th>
    </tr></thead><tbody>`;
  for (const r of rows) {
    h += `<tr class="${hlSet.has(r.code)?'hl':''}">
      <td class="dim">${r.rank}</td><td class="l dim">${r.code}</td>
      <td class="l ${colorCls(r.pct)}">${r.name}</td>
      <td>${fmtPrice(r.price,r.pct)}</td><td>${fmtPct(r.pct)}</td>
      <td>${fmtVol(r.volume)}</td></tr>`;
  }
  return h + '</tbody></table></div></div>';
}
function futuresCard(rows) {
  let h = `<div class="card"><div class="card-title">全球市场</div><table>
    <thead><tr><th class="l">品种</th><th>当前价</th><th>涨跌额</th><th>涨跌幅%</th>
    </tr></thead><tbody>`;
  for (const r of rows) {
    h += `<tr><td class="l ${colorCls(r.pct)}">${r.name}</td>
      <td>${fmtPrice(r.price,r.pct)}</td><td>${fmtChange(r.change,r.pct)}</td>
      <td>${fmtPct(r.pct)}</td></tr>`;
  }
  return h + '</tbody></table></div>';
}

/* ── 行情渲染 ── */
function render(data) {
  const hlSet = new Set(data.highlighted || []);
  const seen = new Set();
  let whtml = '';
  for (const cat of CAT_ORDER) {
    if (data.watchlist[cat]) { whtml += watchlistCard(cat, data.watchlist[cat], hlSet); seen.add(cat); }
  }
  for (const cat of Object.keys(data.watchlist))
    if (!seen.has(cat)) whtml += watchlistCard(cat, data.watchlist[cat], hlSet);
  document.getElementById('watchlist-grid').innerHTML = whtml;
  if (data.futures?.length)
    document.getElementById('futures-panel').innerHTML = futuresCard(data.futures);
  const lb = data.leaderboard;
  document.getElementById('leaderboard-grid').innerHTML =
    leaderboardCard('涨幅榜', lb.gain||[], hlSet) +
    leaderboardCard('跌幅榜', lb.loss||[], hlSet) +
    leaderboardCard('成交量榜', lb.volume||[], hlSet);
  document.getElementById('updated-val').textContent  = data.updated || '--';
  document.getElementById('interval-val').textContent = _interval;
  const cnt = hlSet.size;
  document.getElementById('alert-val').textContent = cnt > 0 ? `⚡ ${cnt} 只股票变动` : '';
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main').style.display = 'flex';
}

/* ── Live News 内嵌状态 ── */
let _liveItems = [], _liveIdx = 0, _liveIv = null;
let _dismissedNew = new Set(); // 用户已手动关闭的 "New!" 链接

function _makeLiveInlineBlock() {
  const b = document.createElement('div');
  b.id = 'live-inline';
  b.className = 'news-block live-block';
  b.innerHTML =
    `<div class="nb-header">` +
      `<span style="display:flex;align-items:center;gap:5px">` +
        `<span class="live-dot"></span>` +
        `<span style="color:var(--live);font-weight:bold;font-size:11px;letter-spacing:1px">Live News</span>` +
        `<span class="live-src news-source" style="background:#2d1625;color:#f472b6"></span>` +
      `</span>` +
      `<span class="live-time news-time"></span>` +
    `</div>` +
    `<div class="live-inline-body">` +
      `<button class="live-nav live-prev">&#8249;</button>` +
      `<div class="nb-title live-inline-title"><a href="" target="_blank" rel="noopener"></a></div>` +
      `<button class="live-nav live-next">&#8250;</button>` +
    `</div>` +
    `<div class="live-dots"></div>`;
  b.querySelector('.live-prev').addEventListener('click', () => {
    if (!_liveItems.length) return;
    _liveIdx = (_liveIdx - 1 + _liveItems.length) % _liveItems.length;
    _updateLiveInline(); _resetLiveTimer();
  });
  b.querySelector('.live-next').addEventListener('click', () => {
    if (!_liveItems.length) return;
    _liveIdx = (_liveIdx + 1) % _liveItems.length;
    _updateLiveInline(); _resetLiveTimer();
  });
  return b;
}

function _updateLiveInline() {
  const block = document.getElementById('live-inline');
  if (!block || !_liveItems.length) return;
  const item    = _liveItems[_liveIdx];
  const display = item.title_cn || item.title;
  const orig    = item.title_cn ? item.title : '';
  block.querySelector('.live-src').textContent  = item.source;
  block.querySelector('.live-time').textContent = item.time;
  const a = block.querySelector('.live-inline-title a');
  a.href = item.link; a.title = orig; a.textContent = display;

  const existingBadge = block.querySelector('.news-new-badge');
  if (existingBadge) existingBadge.remove();
  const now = Math.floor(Date.now() / 1000);
  const isNew = item._ts > 0 && (now - item._ts) <= 900 && !_dismissedNew.has(item.link);
  if (isNew) {
    const badge = document.createElement('span');
    badge.className = 'news-new-badge';
    badge.textContent = 'New!';
    const dismiss = () => { _dismissedNew.add(item.link); badge.remove(); };
    badge.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); dismiss(); });
    a.addEventListener('click', dismiss, { once: true });
    const remaining = Math.max(100, (900 - (now - item._ts)) * 1000);
    setTimeout(() => { if (badge.isConnected) badge.remove(); }, remaining);
    a.after(badge);
  }

  const dotsEl = block.querySelector('.live-dots');
  if (dotsEl.children.length !== _liveItems.length)
    dotsEl.innerHTML = _liveItems.map(() => `<span class="live-dot-item"></span>`).join('');
  [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === _liveIdx));
}

function _resetLiveTimer() {
  if (_liveIv) clearInterval(_liveIv);
  _liveIv = setInterval(() => {
    if (!_liveItems.length) return;
    const block = document.getElementById('live-inline');
    if (block) block.classList.add('nb-cycling');
    setTimeout(() => {
      _liveIdx = (_liveIdx + 1) % _liveItems.length;
      _updateLiveInline();
      const b = document.getElementById('live-inline');
      if (b) b.classList.remove('nb-cycling');
    }, 250);
  }, 15000);
}

/* ── 新闻头条：2 列，每源一块，带箭头 / 点 / New! 标记 ── */
const renderNews = (function() {
  let _ivs = [];
  const _state = {}; // { [src]: { newestTs, idx } }

  function makeNewsBlock(src, pool, startIdx, onIdxChange) {
    const block = document.createElement('div');
    block.className = 'news-block';
    block.innerHTML =
      `<div class="nb-header">` +
        `<span class="news-source">${esc(src)}</span>` +
        `<span class="nb-meta"><span class="news-time"></span></span>` +
      `</div>` +
      `<div class="live-inline-body">` +
        `<button class="live-nav live-prev">&#8249;</button>` +
        `<div class="nb-title"><a href="" target="_blank" rel="noopener"></a></div>` +
        `<button class="live-nav live-next">&#8250;</button>` +
      `</div>` +
      `<div class="live-dots"></div>`;

    let idx = startIdx, ivId = null;

    function show() {
      const item    = pool[idx];
      const display = item.title_cn || item.title;
      const orig    = item.title_cn ? item.title : '';
      const now     = Math.floor(Date.now() / 1000);
      const isNew   = item._ts > 0 && (now - item._ts) <= 900 && !_dismissedNew.has(item.link);

      block.querySelector('.news-time').textContent = item.time;
      const a = block.querySelector('.nb-title a');
      a.href = item.link; a.title = orig; a.textContent = display;

      const existing = block.querySelector('.news-new-badge');
      if (existing) existing.remove();
      if (isNew) {
        const badge = document.createElement('span');
        badge.className = 'news-new-badge';
        badge.textContent = 'New!';
        const dismiss = () => { _dismissedNew.add(item.link); badge.remove(); };
        badge.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); dismiss(); });
        a.addEventListener('click', dismiss, { once: true });
        const remaining = Math.max(100, (900 - (now - item._ts)) * 1000);
        setTimeout(() => { if (badge.isConnected) badge.remove(); }, remaining);
        a.after(badge);
      }

      const dotsEl = block.querySelector('.live-dots');
      if (pool.length <= 1) {
        dotsEl.style.display = 'none';
      } else {
        dotsEl.style.display = '';
        if (dotsEl.children.length !== pool.length)
          dotsEl.innerHTML = pool.map(() => `<span class="live-dot-item"></span>`).join('');
        [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === idx));
      }
    }

    function setIdx(i) { idx = i; onIdxChange(i); show(); }

    function resetTimer() {
      if (ivId) {
        clearInterval(ivId);
        const pos = _ivs.indexOf(ivId);
        if (pos !== -1) _ivs.splice(pos, 1);
        ivId = null;
      }
      if (pool.length <= 1) return;
      ivId = setInterval(() => {
        block.classList.add('nb-cycling');
        setTimeout(() => { setIdx((idx + 1) % pool.length); block.classList.remove('nb-cycling'); }, 250);
      }, 45000);
      _ivs.push(ivId);
    }

    if (pool.length <= 1) {
      block.querySelector('.live-prev').style.display = 'none';
      block.querySelector('.live-next').style.display = 'none';
    } else {
      block.querySelector('.live-prev').addEventListener('click', () => {
        setIdx((idx - 1 + pool.length) % pool.length); resetTimer();
      });
      block.querySelector('.live-next').addEventListener('click', () => {
        setIdx((idx + 1) % pool.length); resetTimer();
      });
    }

    show();
    resetTimer();
    return block;
  }

  return function(items) {
    if (!items?.length) return;

    _ivs.forEach(id => clearInterval(id));
    _ivs = [];

    const bySource = {}, order = [];
    for (const item of items) {
      if (!bySource[item.source]) { bySource[item.source] = []; order.push(item.source); }
      bySource[item.source].push(item);
    }

    const list = document.getElementById('news-list');
    list.innerHTML = '';
    const frag = document.createDocumentFragment();

    for (const src of order) {
      const pool       = bySource[src].slice(0, 6);
      const prev       = _state[src] || {};
      const newNewestTs = pool[0]?._ts || 0;
      // Jump to newest (idx 0) only when a new article arrived; otherwise resume position
      const startIdx   = (newNewestTs > (prev.newestTs || 0)) ? 0
                       : Math.min(prev.idx || 0, pool.length - 1);
      _state[src] = { newestTs: newNewestTs, idx: startIdx };
      frag.appendChild(makeNewsBlock(src, pool, startIdx, (i) => { _state[src].idx = i; }));
    }

    frag.appendChild(_makeLiveInlineBlock());
    list.appendChild(frag);
    _updateLiveInline();
    if (_liveItems.length && !_liveIv) _resetLiveTimer();
  };
})();

/* ── Live News：内嵌在新闻头条网格底部，1行横跨2列 ── */
function renderLiveNews(items) {
  if (!items?.length) return;
  const bySource = {}, order = [];
  for (const item of items) {
    if (!bySource[item.source]) { bySource[item.source] = item; order.push(item.source); }
  }
  const next = order.map(s => bySource[s]);
  if (next.length !== _liveItems.length) _liveIdx = 0;
  _liveItems = next;
  _updateLiveInline();
  if (_liveItems.length && !_liveIv) _resetLiveTimer();
}

/* ── 跳跃游戏 ── */
(function() {
  'use strict';
  const _cv = document.getElementById('dino-canvas');
  const g   = _cv.getContext('2d');

  const GH  = 22;   // ground offset from bottom
  const CVH = 60;   // character visual height (feet→skull crest)
  const CHH = 52;   // hitbox height
  const CHW = 11;   // hitbox half-width
  const CX  = 76;   // character X
  const GR  = 0.55; // gravity

  let gY, jV;
  let state = 'idle';
  let cY, vY, spd, tick, score, hiScore = 0;
  let obs, nSpawn;

  function resize() {
    const p = _cv.parentElement;
    _cv.width  = Math.max(250, p.clientWidth  || 250);
    _cv.height = Math.max(120, p.clientHeight || 160);
    gY = _cv.height - GH;
    jV = -Math.sqrt(2 * GR * Math.max(35, gY - CVH - 6));
  }

  function gameReset() {
    resize();
    cY = gY; vY = 0; spd = 5; tick = 0; score = 0;
    obs = []; nSpawn = _cv.width + 260;
  }

  function jump() {
    if (state === 'idle')    { state = 'running'; if (cY >= gY - 2) vY = jV; }
    else if (state === 'running')  { if (cY >= gY - 2) vY = jV; }
    else if (state === 'dead')     { gameReset(); state = 'running'; }
  }

  function update() {
    if (state !== 'running') return;
    tick++;  score++;
    if (score % 500 === 0) spd = Math.min(spd + 0.5, 14);
    vY += GR;  cY = Math.min(gY, cY + vY);
    if (cY >= gY) vY = 0;
    for (const o of obs) o.x -= spd;
    obs = obs.filter(o => o.x + o.w > -5);
    nSpawn -= spd;
    if (nSpawn < _cv.width + 5) {
      const h = 26 + Math.random() * 34, w = 16 + Math.random() * 16;
      obs.push({ x: _cv.width + 10, w, h });
      nSpawn = _cv.width + 240 + Math.random() * 360;
    }
    const hx1 = CX - CHW, hx2 = CX + CHW;
    for (const o of obs) {
      if (hx2 > o.x + 2 && hx1 < o.x + o.w - 2 && cY > gY - o.h + 3) {
        state = 'dead';
        if (score > hiScore) hiScore = score;
      }
    }
  }

  /* ── 障碍物：源石晶体 ── */
  function drawObs(o) {
    const mX = o.x + o.w * 0.5;
    g.strokeStyle = '#364d6e'; g.lineWidth = 0.8;
    g.fillStyle = '#1b2236';
    g.beginPath(); g.moveTo(o.x, gY);
    g.lineTo(mX - o.w*0.05, gY - o.h*0.78);
    g.lineTo(o.x + o.w*0.48, gY); g.closePath(); g.fill(); g.stroke();
    g.fillStyle = '#1e2940';
    g.beginPath(); g.moveTo(mX - o.w*0.12, gY);
    g.lineTo(mX, gY - o.h);
    g.lineTo(mX + o.w*0.12, gY); g.closePath(); g.fill(); g.stroke();
    g.fillStyle = '#1b2236';
    g.beginPath(); g.moveTo(o.x + o.w*0.52, gY);
    g.lineTo(mX + o.w*0.05, gY - o.h*0.7);
    g.lineTo(o.x + o.w, gY); g.closePath(); g.fill(); g.stroke();
    g.fillStyle = 'rgba(50,90,200,0.1)';
    g.beginPath(); g.moveTo(mX, gY - o.h*0.3);
    g.lineTo(mX - 2, gY); g.lineTo(mX + 2, gY); g.closePath(); g.fill();
  }

  /* ── 角色绘制：Chrome 小恐龙（朝右） ── */
  function drawChar(bx, by, tf, dead) {
    g.save(); g.translate(bx, by);
    const C = '#535353';
    const jumping = by < gY - 2;
    const s = jumping ? 0 : Math.sin(tf * 0.28) * 7;  // 腿摆幅
    g.fillStyle = C;

    // 尾巴（梯形，向左延伸）
    g.beginPath();
    g.moveTo(-8, -24); g.lineTo(-22, -19);
    g.lineTo(-20, -30); g.lineTo(-8,  -31);
    g.closePath(); g.fill();

    // 后腿（在身体后面）
    g.fillRect(-s - 4, -22, 7, 17);
    g.fillRect(-s - 4,  -5, 11,  4);

    // 身体
    g.fillRect(-10, -38, 24, 16);

    // 小短臂（霸王龙特征）
    g.fillRect(2, -40, 8, 5);
    g.fillRect(4, -36, 6, 4);

    // 头骨后脑隆起（向左高出一截）
    g.fillRect(4, -60, 9, 6);
    // 头部主体
    g.fillRect(4, -56, 20, 14);
    // 下颚（向右突出）
    g.fillRect(18, -48, 6, 6);

    // 前腿（在身体前面）
    g.fillRect(s - 4, -22, 7, 17);
    g.fillRect(s - 4,  -5, 11,  4);

    // 嘴巴开合（跑动时动态）
    if (!dead) {
      const mOpen = jumping ? 0 : Math.round(Math.abs(Math.sin(tf * 0.18)) * 3);
      if (mOpen > 0) {
        g.fillStyle = '#1a1a1a';
        g.fillRect(18, -44, 6, mOpen);
      }
      g.fillStyle = C;
    }

    // 眼睛
    if (!dead) {
      g.fillStyle = '#f5f5f5';
      g.fillRect(17, -55, 5, 5);
      g.fillStyle = '#1a1a1a';
      g.fillRect(19, -54, 2, 2);
    } else {
      g.strokeStyle = '#f5f5f5'; g.lineWidth = 1.5; g.lineCap = 'square';
      g.beginPath();
      g.moveTo(16,-57); g.lineTo(23,-50);
      g.moveTo(23,-57); g.lineTo(16,-50);
      g.stroke();
    }

    g.restore();
  }

  /* ── 渲染帧 ── */
  function draw() {
    g.fillStyle = '#1a1a1a';
    g.fillRect(0,0,_cv.width,_cv.height);

    g.fillStyle = '#363636'; g.fillRect(0,gY,_cv.width,2);
    g.fillStyle = '#262626';
    const gOff = (tick * spd * 0.5) % 50;
    for (let i = -gOff; i < _cv.width; i += 50) g.fillRect(i,gY+4,25,1);

    for (const o of obs) drawObs(o);
    drawChar(CX, cY, tick, state === 'dead');

    g.font = '11px monospace'; g.textAlign = 'right';
    if (hiScore > 0) {
      g.fillStyle = '#383838';
      g.fillText('HI ' + String(Math.floor(hiScore/10)).padStart(5,'0'), _cv.width-72, 16);
    }
    g.fillStyle = '#505050';
    g.fillText(String(Math.floor(score/10)).padStart(5,'0'), _cv.width-10, 16);

    g.textAlign = 'center';
    if (state === 'idle') {
      g.fillStyle = '#555'; g.font = '12px monospace';
      g.fillText('空格 / 点击 开始', _cv.width/2, gY/2 + 6);
    } else if (state === 'dead') {
      g.fillStyle = '#999'; g.font = 'bold 12px monospace';
      g.fillText('GAME  OVER', _cv.width/2, gY/2 - 6);
      g.fillStyle = '#555'; g.font = '10px monospace';
      g.fillText('空格 / 点击 重玩', _cv.width/2, gY/2 + 10);
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
  });
  _cv.addEventListener('click', jump);
  _cv.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

  new ResizeObserver(() => { if (state === 'idle') { resize(); cY = gY; } }).observe(_cv.parentElement);

  requestAnimationFrame(() => { gameReset(); loop(); });
})();

/* ── 数据获取 ── */
async function fetchData() {
  try {
    const r = await fetch('/api/data');
    const d = await r.json();
    if (d.updated) render(d);
  } catch(e) { console.error('data error:', e); }
}
async function fetchNews() {
  try { renderNews(await (await fetch('/api/news')).json()); }
  catch(e) { console.error('news error:', e); }
}
async function fetchLiveNews() {
  try { renderLiveNews(await (await fetch('/api/live-news')).json()); }
  catch(e) { console.error('live-news error:', e); }
}

/* ── 初始化 + SSE ── */
async function init() {
  await fetchData();
  await fetchNews();
  await fetchLiveNews();
  const es = new EventSource('/stream');
  es.onmessage = e => {
    if      (e.data === 'refresh')   fetchData();
    else if (e.data === 'news')      fetchNews();
    else if (e.data === 'live-news') fetchLiveNews();
  };
  es.onerror = () => console.warn('SSE reconnecting…');
}

init();

(function() {
  function updateClock() {
    const n = new Date();
    const pad = v => String(v).padStart(2,'0');
    document.getElementById('header-clock').textContent =
      `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}  ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
})();
</script>
